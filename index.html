<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div>
        <p class="eyebrow">NASA APOD Gallery</p>
        <h1>Space Explorer</h1>
      </div>
    </header>

    <section class="fact-card" aria-label="Space fact">
      <p class="fact-label">Did You Know?</p>
      <p id="spaceFact" class="fact-text">Loading a fun space fact...</p>
    </section>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchImagesButton" type="button">Get Space Images</button>
    </div>

    <p id="statusMessage" class="status-message" aria-live="polite">Select a date range and click "Get Space Images" to explore the cosmos.</p>

    <div id="gallery" class="gallery" aria-live="polite"></div>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeModalButton" class="modal-close" type="button" aria-label="Close image details">&times;</button>
      <div id="modalMedia" class="modal-media"></div>
      <div class="modal-content">
        <p id="modalDate" class="modal-date"></p>
        <h2 id="modalTitle"></h2>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
